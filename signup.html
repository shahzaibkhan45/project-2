<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
 <div class="signup-container">
    <h2>Sign Up</h2>
    <form class="form">
    <p>Sign up to create your account</p>
    <input type="text" placeholder="Full Name" id="name" class="fields">
    <input type="email" placeholder="Email" id="email" class="fields">
    <input type="password"  placeholder="Password" id="pass" class="fields">
    <input type="password"  placeholder="Confirm Password" id="cpass" class="fields">
    <button type="submit" class="signup-btn">Sign Up</button>
    </form>
    <p class="have-account">Already have an account? <a href="./index.html">Log in</a></p>
</body>
</html>
