<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project-02</title>
     <!-- external font -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css -->
     <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="back">
           <b><a href="./login.html"> <i class="ri-arrow-left-fill"></i>Back</a></b>
        </div>
    <section class="sign-section">
<div id="toast" hidden>
    
</div>
 <div class="signup-container">
    <h2>Sign Up</h2>
    <p>Sign up to create your account</p>
    <form class="signup-form">
    <input type="text" placeholder="Full Name" id="name" class="fields-signup">
    <input type="email" placeholder="Email" id="email" class="fields-signup">
    <div class="password-box">
    <input type="password"  placeholder="Password" id="pass" class="fields-signup">
    <i class="ri-eye-line" id="togglePassword"></i>
    </div>
    
    <div class="password-box">
    <input type="password"  placeholder="Confirm Password" id="cpass" class="fields-signup">
    <i class="ri-eye-line" id="toggleCPassword"></i>
    </div>
    <button type="submit" id="btn" class="signup-btn" href="./join.html">Sign Up</button>
    </form>
    <p class="have-account">Already have an account? <a href="./login.html">Log in</a></p>
    </div>
    </section>
    <script src="./assets/js/script.js"></script>
</body>
</html>
